<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #1f2937;
            color: white;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            margin-left: 20px;
            padding: 8px 15px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            background: #374151;
        }

        .btn-primary {
            background: #2563eb;
        }

        /* HERO SECTION */
        .hero {
            height: calc(100vh - 70px);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;

            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .hero h1 {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 25px;
        }

        .hero a {
            text-decoration: none;
            background: white;
            color: #333;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .hero a:hover {
            background: #ddd;
        }

        /* CURSOR ANIMATION */
        .cursor {
            border-right: 3px solid white;
            padding-right: 5px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🛒 MyStore</div>

    <div class="nav-links">
        <a href="register.html">Register</a>
        <a href="login.html" class="btn-primary">Login</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>
            <span id="typing-text"></span>
            <span class="cursor"></span>
        </h1>

        <p>Shop smart. Shop easy. Shop now.</p>

        <a href="register.html">Get Started</a>
    </div>
</div>

<!-- JS for animation -->
<script>
    const text = "Welcome to My Web App";
    let index = 0;

    function typeEffect() {
        if (index < text.length) {
            document.getElementById("typing-text").innerHTML += text.charAt(index);
            index++;
            setTimeout(typeEffect, 60);
        }
    }

    window.onload = typeEffect;
</script>

</body>
</html>
